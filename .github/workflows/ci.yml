name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
      TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
      TOKEN_EXPIRATION: ${{ secrets.TOKEN_EXPIRATION }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}


    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Usar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm install

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Rodar lint
        run: npm run lint

      - name: Esperar Postgres ficar pronto
        run: |
          for i in {1..10}; do
            pg_isready -h postgres -U test && break
            echo "Aguardando Postgres..."
            sleep 3
          done

      - name: Rodar testes
        run: npm test

      - name: Build do projeto
        run: npm run build
